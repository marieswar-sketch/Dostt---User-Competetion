<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dostt Coins League</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="particles-container"></div>

    <div id="authScreen" class="screen active">
        <div class="auth-card">
            <img src="Dostt Logo.png" alt="Dostt Logo" class="main-logo" />
            <h1>Dostt Coins League</h1>
            <p class="subtitle">Enter your mobile to see your progress</p>

            <div class="input-group">
                <input type="text" id="mobileInput" placeholder="Mobile Number" maxlength="10" />
                <button id="lookupBtn">
                    <span class="btn-text">Check Progress</span>
                    <span class="spinner hidden"></span>
                </button>
            </div>
            <p id="errorMsg" class="error hidden"></p>

            <div class="reward-hint">
                <span style="display: block; margin-bottom: 5px;">📱 1st: Nothing Phone</span>
                <span style="display: block;">🎧 2nd: Apple AirPods 4</span>
            </div>
        </div>
    </div>

    <div id="dashboardScreen" class="screen">
        <header class="dashboard-header">
            <img src="Dostt Logo.png" alt="Dostt Logo" class="nav-logo" />
            <div class="header-info">
                <h2>Dostt Coins League</h2>
                <p>2 Mar – 5 Mar </p>
            </div>
            <button id="logoutBtn" class="icon-btn">Logout</button>
        </header>

        <main class="dashboard-content">
            <div class="stats-grid">
                <div class="stat-card glass" id="rankCard">
                    <span class="label">Current Rank</span>
                    <div class="value-container">
                        <span id="rankValue" class="value">--</span>
                    </div>
                </div>

                <div class="stat-card glass highlight" id="coinsCard">
                    <span class="label">Coins Utilized</span>
                    <div class="value-container">
                        <span id="coinsUtilized" class="value">--</span>
                        <span class="unit">COINS</span>
                    </div>
                </div>
            </div>

            <div class="motivation-banner glass">
                <div class="gift-icon" id="giftIcon">🎁</div>
                <div id="motivation" class="motivation-text">
                    Keep spending coins to win the <strong>Nothing Phone</strong>! 📱
                </div>
            </div>
        </main>

        <footer class="dashboard-footer">
            <a href="#" id="termsLink">Terms & Conditions</a>
        </footer>
    </div>

    <script src="script.js"></script>

    <script>
        const rankObs = document.getElementById('rankValue');
        const motivationObs = document.getElementById('motivation');
        const iconObs = document.getElementById('giftIcon');

        const observer = new MutationObserver(() => {
            // Clean the rank text (removes '#' or spaces)
            let rawRank = rankObs.innerText.replace(/[^0-9]/g, '').trim();
            let currentRank = parseInt(rawRank);
            
            if (isNaN(currentRank)) return;

            if (currentRank === 1) {
                iconObs.innerText = "📱";
                motivationObs.innerHTML = "You're Rank #1! Hold your spot for the <strong>Nothing Phone</strong>! 📱";
            } else if (currentRank === 2) {
                iconObs.innerText = "🎧";
                motivationObs.innerHTML = "You're Rank #2! You're winning the <strong>Apple AirPods 4</strong>! Push for Rank 1! 🎧";
            } else {
                iconObs.innerText = "🚀";
                motivationObs.innerHTML = "You're Rank #" + currentRank + "! Keep spending coins to grab those <strong>Apple AirPods 4</strong>! 🎧 &<strong>Nothing Phone</strong>! 📱";
            }
        });

        // Watch the rankValue for any changes made by script.js
        observer.observe(rankObs, { childList: true, characterData: true, subtree: true });
    </script>
</body>
</html>
